<!DOCTYPE html>
<html lang="gr"> 
<!-- η αρχικη γλωσσα ειναι κινεζικα -->

<head>
<meta charset="UTF-8"> <!-- υποστηριζει ολες τις γλωσσες-->
<title>Golden Wok</title> <!--το ονομα που εφανιζεται στο Tab του Browser -->
<link rel="stylesheet" href="style.css">
</head>

<body> <!-- ξεκιναει το περιεχομενο της ιστοσελίδας -->

<header> <!-- η πανω μπρα της ιστοσελιδας -->

<!-- SITETITLE---------->
<h2 id="siteTitle"></h2> 
<!--Πηγαινε στο app.js  εκτελεσε την getelementbyid= "siteTitle" και πηγαινε στο config.js και βρες το text-->

<div class="lang"> <!-- // κουμπια γλωσσας  -->
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('gr')">Ελληνικά</button>
</div>

<!------------------ HERO-------------->
</header>

<section class="hero">

<h1 id="welcome"></h1>
<p id="slogan"></p>

<!------------------ ARD MODULE-------------->

<section class="card-module">


<h2 id="orderTitle"></h2> <!-- OPENING HOURS-->

<div class="buffet-box">

<p id="openingText"></p>

<p id="buffetTime"></p>
<p id="buffetPrice"></p>

</div>

<a id="orderButton" class="order-btn" target="_blank"></a>  <!-- EFOOD-->
</section>

</section>
<!---MENU----------------->
<section class="menu">

<h2 id="menuTitle"></h2>

<div id="menuContainer"></div> <!-- ΔΗΜΙΟΥΡΓΕΙ ΔΥΝΑΜΙΚΑ ΤΟ ΜΕΝΟΥ-->

</section>

<!--MAP------------>
<section class="map">

<h2 id="locationTitle"></h2>

<!--Ενσωματωμένος χάρτης Google.-->
<iframe
width="90%"
height="350"
loading="lazy"
src="https://www.google.com/maps?q=Leof.+Andrea+Siggrou+207,+Nea+Smirni+171+21&output=embed">
</iframe>

</section>
<!--CONTACT----------->
<section class="contact">

<h2 id="contactTitle"></h2>
<p id="contactPhone"></p>
<p id="contactAddress"></p>

</section>

<footer>

<div class="footer-brand">Golden Wok</div>

<div class="footer-copy">
Golden Wok © 2026
</div>

</footer>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
