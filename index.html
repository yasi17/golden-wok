<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Wok | Authentic Chinese</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2 id="siteTitle" class="brand-title"></h2>
    <div class="lang">
        <button onclick="setLang('zh')">中文</button>
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('gr')">Ελληνικά</button>
    </div>
</header>

<section class="hero">
    <h1 id="welcome"></h1>
    <p id="slogan"></p>

    <div class="card-module">
        <h2 id="orderTitle"></h2>
        <div class="buffet-box">
            <p id="openingText"></p>
            <p id="buffetTime"></p>
            <p id="buffetPrice"></p>
        </div>
        <a id="orderButton" class="order-btn" 
           href="https://www.e-food.gr/delivery/nea-smurni/golden-wok-8734941" 
           target="_blank"></a>
    </div>
</section>

<section class="menu">
    <h2 id="menuTitle"></h2>
    <div id="menuContainer"></div>
</section>

<section class="map">
    <h2 id="locationTitle"></h2>
    <iframe
        width="90%"
        height="400"
        style="border:0; border-radius: 18px;"
        loading="lazy"
        allowfullscreen
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3146.4468494916325!2d23.7126138765438!3d37.94331570258108!2m3!1f0!2f0!3f0!3m2!1i1024!2i1024!4f13.1!3m3!1m2!1s0x14a1bd99222c547d%3A0xc49a46f40498b89e!2sLeof.%20Andrea%20Siggrou%20207%2C%20Nea%20Smirni%20171%2021!5e0!3m2!1sel!2sgr!4v1700000000000">
    </iframe>
</section>

<section class="contact">
    <h2 id="contactTitle"></h2>
    <p id="contactPhone"></p>
    <p id="contactAddress"></p>
</section>

<footer>
    <div class="footer-brand">Golden Wok</div>
    <div class="footer-copy">Golden Wok © 2026</div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
