<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>Golden Wok</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h2 id="siteTitle"></h2>

<div class="lang">
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">English</button>
<button onclick="setLang('gr')">Ελληνικά</button>
</div>

</header>

<section class="hero">

<h1 id="welcome"></h1>
<p id="slogan"></p>

<section class="card-module">


<h2 id="orderTitle"></h2>

<div class="buffet-box">

<p id="openingText"></p>

<p id="buffetTime"></p>
<p id="buffetPrice"></p>

</div>

<a id="orderButton" class="order-btn" 
href="https://www.e-food.gr/delivery/nea-smurni/golden-wok-8734941" 
target="_blank"></a>

</section>

</section>



<section class="menu">

<h2 id="menuTitle"></h2>

<div id="menuContainer"></div>

</section>
<!---///////////////////////////////////////////-->
<section id="gallery">

<h1>Gallery</h1>

<div class="gallery">

<button class="arrow left" onclick="prevSlide()">❮</button>

<div class="gallery-track" id="galleryTrack">

<img src="images/food1.webp" onclick="openImage(this)">   
<img src="images/food2.webp" onclick="openImage(this)">
<img src="images/food3.webp" onclick="openImage(this)">
<img src="images/food4.webp" onclick="openImage(this)">
<img src="images/food5.webp" onclick="openImage(this)">
<img src="images/food6.webp" onclick="openImage(this)">
<img src="images/food9.webp" onclick="openImage(this)">
<img src="images/food10.webp" onclick="openImage(this)">
<img src="images/food11.webp" onclick="openImage(this)">
<img src="images/food12.webp" onclick="openImage(this)">
<img src="images/food13.webp" onclick="openImage(this)">
<img src="images/food14.webp" onclick="openImage(this)">
<img src="images/f18.webp" onclick="openImage(this)">
<img src="images/f19.webp" onclick="openImage(this)">
<img src="images/f20.webp" onclick="openImage(this)">
<img src="images/f21.webp" onclick="openImage(this)">
<img src="images/f22.webp" onclick="openImage(this)">
<img src="images/f23.webp" onclick="openImage(this)">
<img src="images/f24.webp" onclick="openImage(this)">
<img src="images/f25.webp" onclick="openImage(this)">
<img src="images/f26.webp" onclick="openImage(this)">
<img src="images/f27.webp" onclick="openImage(this)">



</div>

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

</section>

<div id="lightbox" onclick="closeImage()">
<img id="lightboxImg">
</div>
<!--////////////////////////////////-->
<section class="map">

<h2 id="locationTitle"></h2>

<iframe
width="90%"
height="350"
loading="lazy"
src="https://www.google.com/maps?q=Leof.+Andrea+Siggrou+207,+Nea+Smirni+171+21&output=embed">
</iframe>

</section>

<section class="contact">

<h2 id="contactTitle"></h2>
<p id="contactPhone"></p>
<p id="contactAddress"></p>

</section>

<footer>

<div class="footer-brand">Golden Wok</div>

<div class="footer-copy">
Golden Wok © 2026
</div>

</footer>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
